<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Buscador de CNPJ</title>
</head>

<body>
    <h1>Busque qualquer CNPJ</h1>
        <label for="CNPJ">CNPJ:</label>
        <input type="text" id="cnpj" maxlength="18" placeholder="00.000.000/0000-00">
        <!--"onclick="buscarCNPJ()"" chama a função criada no arquivo main.js e atribui ela ao botão "buscar"-->
        <button onclick="buscarCNPJ()">Buscar</button>

    <div id="resultado"></div>
    <script src="main.js"></script>
</body>

</html>
